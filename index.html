<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Browser - UI Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 90%;
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1em;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .card-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .card-title {
            color: #333;
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .card-desc {
            color: #666;
            font-size: 0.9em;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .status {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            background: #e8f5e9;
            border-radius: 8px;
            color: #2e7d32;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 Content Browser</h1>
        <p class="subtitle">UI设计演示Demo - 可交互的内容浏览器界面</p>
        
        <div class="card-grid">
            <div class="card" onclick="showMessage('图片')">
                <div class="card-icon">🖼️</div>
                <div class="card-title">图片资源</div>
                <div class="card-desc">浏览和管理图片文件</div>
            </div>
            <div class="card" onclick="showMessage('视频')">
                <div class="card-icon">🎬</div>
                <div class="card-title">视频资源</div>
                <div class="card-desc">浏览和管理视频文件</div>
            </div>
            <div class="card" onclick="showMessage('音频')">
                <div class="card-icon">🎵</div>
                <div class="card-title">音频资源</div>
                <div class="card-desc">浏览和管理音频文件</div>
            </div>
            <div class="card" onclick="showMessage('文档')">
                <div class="card-icon">📄</div>
                <div class="card-title">文档资源</div>
                <div class="card-desc">浏览和管理文档文件</div>
            </div>
        </div>

        <button class="btn" onclick="showWelcome()">开始使用</button>
        
        <div id="status" class="status" style="display: none;"></div>
    </div>

    <script>
        function showMessage(type) {
            const status = document.getElementById('status');
            status.textContent = `你点击了 ${type} 资源卡片！`;
            status.style.display = 'block';
            setTimeout(() => {
                status.style.display = 'none';
            }, 3000);
        }

        function showWelcome() {
            const status = document.getElementById('status');
            status.textContent = '欢迎使用 Content Browser！这是一个UI设计演示Demo。';
            status.style.display = 'block';
            setTimeout(() => {
                status.style.display = 'none';
            }, 4000);
        }

        // 页面加载动画
        window.addEventListener('load', () => {
            document.querySelector('.container').style.opacity = '0';
            document.querySelector('.container').style.transform = 'translateY(30px)';
            document.querySelector('.container').style.transition = 'all 0.6s ease';
            
            setTimeout(() => {
                document.querySelector('.container').style.opacity = '1';
                document.querySelector('.container').style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
</body>
</html>
